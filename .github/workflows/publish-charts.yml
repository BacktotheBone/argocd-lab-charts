name: publish-charts

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "charts/**"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Lint, package and push all charts
        run: |
          set -euo pipefail
          for chart in charts/*; do
            [ -f "$chart/Chart.yaml" ] || continue
            helm dependency build "$chart"
            helm lint "$chart"
            helm package "$chart" --destination /tmp
            pkg="$(ls -1 /tmp/$(basename "$chart")-*.tgz | tail -n 1)"
            helm push "$pkg" oci://ghcr.io/backtothebone/argocd-lab-charts
          done