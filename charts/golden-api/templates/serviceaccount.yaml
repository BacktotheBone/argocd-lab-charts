{{- $sa := default dict .Values.serviceAccount -}}
{{- if (default false $sa.create) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default .Release.Name $sa.name }}
  labels:
    {{- include "golden-api.labels" . | nindent 4 }}
  {{- with $sa.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
